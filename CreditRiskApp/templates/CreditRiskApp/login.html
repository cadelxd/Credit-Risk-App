<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'CreditRiskApp/styles.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Login – Credit Risk Analyzer</title>
    <meta name="description" content="Secure login to Credit Risk Analyzer - Advanced financial risk assessment platform">
</head>
<body>
    <!-- Fixed Top Dashboard -->
    <div class="top-dashboard">
        <div class="dashboard-content">
            <div class="logo-section">
                <h3>Credit Risk Analyzer</h3>
            </div>
            <div class="dashboard-controls">
                <!-- Theme Toggle -->
                <div class="theme-toggle">
                    <span>🌙</span>
                    <div class="toggle-switch" onclick="toggleTheme()" role="button" tabindex="0" aria-label="Toggle dark/light mode">
                    </div>
                    <span>☀️</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <h1>Welcome Back</h1>

        <div class="form-container">
            {% if form.errors %}
                <div class="error-message">
                    ⚠️ Invalid username or password. Please try again.
                </div>
            {% endif %}

            <form method="post" id="loginForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="{{ form.username.id_for_label }}">Username</label>
                    {{ form.username }}
                </div>
                
                <div class="form-group">
                    <label for="{{ form.password.id_for_label }}">Password</label>
                    {{ form.password }}
                </div>
                
                <button type="submit" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                </button>
            </form>

            <p>Don't have an account? <a href="{% url 'register' %}">Create one here</a></p>
        </div>
    </div>

    <style>
        .top-dashboard {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            height: 70px;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .dashboard-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-section h3 {
            margin: 0;
            color: var(--accent-primary);
            font-weight: 700;
            font-size: 1.4rem;
        }

        .dashboard-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .toggle-switch {
            width: 50px;
            height: 25px;
            background: var(--bg-tertiary);
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 19px;
            height: 19px;
            border-radius: 50%;
            background: var(--text-primary);
            top: 1px;
            left: 2px;
            transition: transform 0.3s ease;
        }

        .toggle-switch.active {
            background: var(--accent-primary);
        }

        .toggle-switch.active::before {
            transform: translateX(25px);
            background: white;
        }

        .main-content {
            margin-top: 70px;
            padding-top: 40px;
            min-height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .dashboard-content {
                padding: 0 15px;
            }
            
            .logo-section h3 {
                font-size: 1.2rem;
            }
            
            .theme-toggle {
                font-size: 1rem;
                gap: 8px;
            }
            
            .toggle-switch {
                width: 45px;
                height: 23px;
            }
            
            .toggle-switch::before {
                width: 17px;
                height: 17px;
            }
            
            .toggle-switch.active::before {
                transform: translateX(22px);
            }
        }
    </style>

    <script>
        // Theme Management
        function toggleTheme() {
            const body = document.body;
            const toggle = document.querySelector('.toggle-switch');
            const currentTheme = body.getAttribute('data-theme');
            
            if (currentTheme === 'light') {
                body.setAttribute('data-theme', 'dark');
                toggle.classList.remove('active');
                // Store theme preference in memory instead of localStorage
                window.currentTheme = 'dark';
            } else {
                body.setAttribute('data-theme', 'light');
                toggle.classList.add('active');
                window.currentTheme = 'light';
            }
        }

        // Initialize theme
        function initTheme() {
            const body = document.body;
            const toggle = document.querySelector('.toggle-switch');
            
            // Default to dark theme
            const savedTheme = window.currentTheme || 'dark';
            body.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'light') {
                toggle.classList.add('active');
            }
        }

        // Form submission with loading state
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const submitBtn = document.getElementById('loginBtn');
            const btnText = submitBtn.querySelector('.btn-text');
            
            submitBtn.classList.add('loading');
            btnText.textContent = 'Signing In...';
            submitBtn.disabled = true;
        });

        // Keyboard accessibility for toggle
        document.querySelector('.toggle-switch').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleTheme();
            }
        });

        // Enhanced input interactions
        const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
        inputs.forEach(input => {
            // Add floating label effect
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });

            // Real-time validation feedback
            input.addEventListener('input', function() {
                if (this.value.length > 0) {
                    this.style.borderColor = 'var(--success-color)';
                } else {
                    this.style.borderColor = 'var(--border-color)';
                }
            });
        });

        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            
            // Add entrance animation
            const container = document.querySelector('.form-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                container.style.transition = 'all 0.5s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });

        // Add some visual feedback for form errors
        {% if form.errors %}
            document.addEventListener('DOMContentLoaded', function() {
                const errorInputs = document.querySelectorAll('input');
                errorInputs.forEach(input => {
                    input.style.borderColor = 'var(--error-bg)';
                    input.addEventListener('focus', function() {
                        this.style.borderColor = 'var(--accent-primary)';
                    });
                });
            });
        {% endif %}
    </script>
</body>
</html>
